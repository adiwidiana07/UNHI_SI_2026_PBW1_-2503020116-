<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Typography</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!--  Heading (h1 – h6) -->
<div class="container mt-4">
<h1>Judul H1</h1>
<h2>Judul H2</h2>
<h3>Judul H3</h3>
<h4>Judul H4</h4>
<h5>Judul H5</h5>
<h6>Judul H6</h6>
<!-- Text Alignment (Left, Center, Right) -->
<p class="h1">Teks seperti H1</p>
<p class="h3">Teks seperti H3</p>
</div>
<!-- Text Color -->
<p class="text-primary">Teks biru</p>
<p class="text-danger">Teks merah</p>
<!-- Font Weight -->
<p class="fw-bold">Teks tebal</p>
<p class="fw-light">Teks tipis</p>
<!-- Lead Text -->
<p class="lead">
Ini adalah teks utama yang lebih menonjol
</p>
     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
